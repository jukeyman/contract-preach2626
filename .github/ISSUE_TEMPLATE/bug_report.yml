name: Bug Report
description: Report a broken page, API route, CRM flow, or deployment issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken or unexpected?
    validations:
      required: true
  - type: input
    id: route
    attributes:
      label: Route or endpoint
      placeholder: /agent, /api/funding/discover, /admin
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open...\n2. Click...\n3. See..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Screenshots, logs, curl output, or browser console errors.
